<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="SUSU量化" />
  <meta name="theme-color" content="#18181b" />

  <title>管理面板 · SUSU 量化</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .wrap { max-width: 1200px; padding-bottom: 60px; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px; margin-bottom: 4px; }
    .metric { background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 16px; text-align: center; }
    .metric .label { font-size: 0.78rem; color: var(--text-3); margin-bottom: 8px; }
    .metric .value { font-size: 1.7rem; font-weight: 700; color: var(--text); }

    th, td { padding: 11px 8px; }
    tr:hover { background: var(--surface); }
    .ip-cell { font-family: ui-monospace, Menlo, monospace; color: var(--text); font-weight: 600; }
    .quota { font-variant-numeric: tabular-nums; }
    .quota.warn { color: #92400e; }
    .quota.over { color: #b91c1c; font-weight: 600; }
    .symbols { color: var(--text-3); font-size: 0.78rem; }

    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .auto-refresh { display: flex; gap: 8px; align-items: center; font-size: 0.85rem; color: var(--text-2); }
    .auto-refresh input[type=number] { width: 52px; background: var(--bg);
      border: 1px solid var(--line-strong); border-radius: var(--radius); padding: 6px 8px;
      color: var(--text); }
    .error { color: #b91c1c; padding: 12px 14px; background: #fef2f2;
      border: 1px solid #fecaca; border-radius: var(--radius); margin-bottom: 14px; }
    .empty { color: var(--text-3); text-align: center; padding: 28px; }
  </style>
</head>
<body>
  <main class="wrap">
  <header class="page-head">
    <div class="eyebrow">SUSU 量化</div>
    <h1 class="title">管理面板</h1>
    <p class="subtitle">实时监控访问与 AI 配额用量</p>
    <nav class="nav">
      <a href="/">个股 AI 研究</a>
      <a href="/select">选股工作台</a>
      <a href="/backtest">策略回测</a>
      <a href="/today">今日策略</a>
      <a href="/journal">实盘周记</a>
      <a href="/admin" class="active">管理面板</a>
    </nav>
  </header>

  <div id="errorBox" style="margin-top:32px;"></div>

  <div class="card">
    <div class="controls">
      <button onclick="refresh()">🔄 刷新数据</button>
      <div class="auto-refresh">
        <input id="autoRefreshInterval" type="number" value="10" min="5" max="60" />
        <label for="autoRefreshInterval">秒自动刷新</label>
        <input id="autoRefreshCheck" type="checkbox" onchange="toggleAutoRefresh()" />
      </div>
    </div>

    <div class="summary">
      <div class="metric">
        <div class="label">数据日期</div>
        <div class="value" id="dateDisplay">—</div>
      </div>
      <div class="metric">
        <div class="label">活跃 IP 数</div>
        <div class="value" id="totalIps">—</div>
      </div>
      <div class="metric">
        <div class="label">单人配额(次)</div>
        <div class="value" id="limitPerIp">—</div>
      </div>
      <div class="metric">
        <div class="label">最后更新</div>
        <div class="value" id="lastUpdate" style="font-size:0.95rem;">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>今日访问统计</h2>
    <div id="tableContainer"></div>
  </div>
  </main>

  <script src="/auth.js"></script>
  <script src="/owner.js"></script>
  <script>
    let autoRefreshTimer = null;

    async function refresh() {
      try {
        const res = await fetch("/api/admin/stats");
        if (!res.ok) {
          const err = await res.json();
          showError(err.error || "请求失败");
          return;
        }
        const data = await res.json();
        renderStats(data);
      } catch (e) {
        showError("网络错误：" + e.message);
      }
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.innerHTML = `<div class="error">❌ ${msg}</div>`;
      setTimeout(() => { box.innerHTML = ""; }, 5000);
    }

    function renderStats(data) {
      document.getElementById("dateDisplay").textContent = data.date;
      document.getElementById("totalIps").textContent = data.total_ips;
      document.getElementById("limitPerIp").textContent = data.limit_per_ip;
      document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString("zh-CN");

      const container = document.getElementById("tableContainer");
      if (!data.stats || data.stats.length === 0) {
        container.innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }

      let html = `<table><thead><tr>
        <th>访问 IP</th><th>总调用</th><th>配额已用</th><th>剩余配额</th>
        <th>最后调用</th><th>最近分析的股票</th></tr></thead><tbody>`;

      for (const stat of data.stats) {
        const warnClass = stat.quota_remaining <= 2 ? "warn" : "";
        const overClass = stat.quota_remaining === 0 ? "over" : "";
        const symbolsHtml = stat.symbols.filter(Boolean).join(", ") || "—";
        html += `<tr>
          <td class="ip-cell">${stat.ip}</td>
          <td class="quota">${stat.calls}</td>
          <td class="quota ${warnClass}">${stat.quota_used}</td>
          <td class="quota ${overClass}">${stat.quota_remaining}</td>
          <td>${stat.last_call.slice(11, 19)}</td>
          <td class="symbols">${symbolsHtml}</td></tr>`;
      }
      html += "</tbody></table>";
      container.innerHTML = html;
    }

    function toggleAutoRefresh() {
      const checked = document.getElementById("autoRefreshCheck").checked;
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      if (checked) {
        const interval = parseInt(document.getElementById("autoRefreshInterval").value) * 1000;
        autoRefreshTimer = setInterval(refresh, interval);
      }
    }

    // 初始加载
    refresh();
  </script>
</body>
</html>
